<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夸父追日 - 多人對戰版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; text-align: center; background-color: #87CEEB; margin: 0; padding: 10px; display: flex; flex-direction: column; min-height: 98vh; overflow-x: hidden; user-select: none; }
        
        .header-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 10px 0 20px 0; }
        h1 { color: #d84315; margin: 0; font-size: 60px; text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8); }

        #topControls { background-color: rgba(255, 255, 255, 0.8); padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .control-label { font-weight: bold; color: #d84315; font-size: 18px; }
        
        .mode-btn { background-color: #03A9F4; color: white; padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .mode-btn.active { background-color: #FF9800; }
        
        #restartBtn { background-color: #607d8b; color: white; padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 20px; }

        #battlefield { display: none; justify-content: center; gap: 15px; flex: 1; padding: 0 10px; flex-wrap: wrap; }
        .player-zone { flex: 1; background: #FFF; border: 4px solid #8B4513; border-radius: 15px; padding: 10px; display: flex; flex-direction: column; align-items: center; min-width: 200px; }
        .stage { width: 100%; aspect-ratio: 4 / 3; position: relative; background: #E0F6FF; border-radius: 10px; margin-bottom: 10px; overflow: hidden; cursor: pointer; }

        .moving-sun { position: absolute; top: 5%; left: -25%; width: 20%; max-width: 80px; height: auto; z-index: 5; opacity: 0; pointer-events: none; transition: left 0.2s ease-out, opacity 0.3s; }
        .kuafu-wrap { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); width: 40%; pointer-events: none; z-index: 10; }
        .kf-canvas { width: 100%; height: auto; display: block; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4)); }
    </style>
</head>
<body>

    <div class="header-container"><h1>🏃‍♂️ 夸父追日 ☀️</h1></div>
    
    <div id="topControls">
        <span class="control-label">遊戲人數：</span>
        <button class="mode-btn" onclick="setPlayerCount(1)">1人</button>
        <button class="mode-btn" onclick="setPlayerCount(4)">4人</button>
        <button id="restartBtn" onclick="resetAll()">🔄 重新開始</button>
    </div>

    <div id="battlefield">
        <div class="player-zone" id="zone-1">
            <div class="stage" onclick="simulateStep(1)">
                <img id="sun-1" class="moving-sun" src="kfsun.png" alt="太陽">
                <div class="kuafu-wrap"><canvas id="kf-canvas-1" class="kf-canvas"></canvas></div>
            </div>
            <div>戰績：<span id="score-1">0</span></div>
        </div>
    </div>

    <script>
        // 改用陣列預先儲存「已經去背好」的畫布 (Canvas)
        const kfImages = new Array(30).fill(null);
        
        for (let i = 1; i <= 30; i++) {
            const img = new Image();
            img.src = `kf${i.toString().padStart(2, '0')}.png`;
            img.onload = () => {
                // 建立一個暫存的畫布來進行預先去背處理
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                const ctx = tempCanvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(img, 0, 0);

                try {
                    const imageData = ctx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                    const data = imageData.data;
                    const width = tempCanvas.width;
                    const height = tempCanvas.height;
                    
                    // 升級：邊緣填充演算法 (Flood Fill) - 就像 Photoshop 的魔術棒！
                    const visited = new Uint8Array(width * height);
                    const stack = [];

                    function push(x, y) {
                        if (x >= 0 && x < width && y >= 0 && y < height) {
                            const idx = y * width + x;
                            if (!visited[idx]) {
                                stack.push(idx);
                                visited[idx] = 1;
                            }
                        }
                    }

                    // 從圖片的最外圍四個邊界開始往內找白色背景
                    for (let x = 0; x < width; x++) { push(x, 0); push(x, height - 1); }
                    for (let y = 0; y < height; y++) { push(0, y); push(width - 1, y); }

                    while (stack.length > 0) {
                        const idx = stack.pop();
                        const p = idx * 4;
                        
                        // 只要是偏白色就去背 (容差 > 230)
                        if (data[p] > 230 && data[p+1] > 230 && data[p+2] > 230) {
                            data[p+3] = 0; // 把符合的背景像素設為透明
                            
                            const x = idx % width;
                            const y = Math.floor(idx / width);
                            // 繼續往相鄰的上下左右像素蔓延
                            push(x - 1, y);
                            push(x + 1, y);
                            push(x, y - 1);
                            push(x, y + 1);
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                } catch(e) {
                    // 若在本機測試遇到 CORS 阻擋讀取像素，則保留原圖不當機
                }
                
                // 把去好背的畫布存進陣列，之後跑步時直接拿來畫
                kfImages[i - 1] = tempCanvas;
            };
        }

        const players = { 1: { currentFrame: 0, targetFrame: 0, lastFrameTime: 0, score: 0 } };

        function drawAndChromaKey(playerId, frameIndex) {
            const canvas = document.getElementById(`kf-canvas-${playerId}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            // 直接拿預先去背好的畫布出來
            const sourceCanvas = kfImages[frameIndex % 30];

            // 確保該張圖片已經載入並去背完成
            if (!sourceCanvas) return;
            
            if (canvas.width !== sourceCanvas.width) { 
                canvas.width = sourceCanvas.width; 
                canvas.height = sourceCanvas.height; 
            }

            // 清空畫面並畫上新的動作
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(sourceCanvas, 0, 0);
        }

        function simulateStep(playerId) {
            players[playerId].targetFrame += 6;
            players[playerId].score++;
            document.getElementById(`score-${playerId}`).innerText = players[playerId].score;
        }

        function updateAnimation() {
            const now = performance.now();
            for (let i = 1; i <= 1; i++) {
                const p = players[i];
                if (p.currentFrame < p.targetFrame && now - p.lastFrameTime >= 30) {
                    p.currentFrame++;
                    p.lastFrameTime = now;
                    drawAndChromaKey(i, p.currentFrame);
                } else if (p.currentFrame === 0) {
                    drawAndChromaKey(i, 0);
                }
            }
            requestAnimationFrame(updateAnimation);
        }

        function setPlayerCount(num) { document.getElementById('battlefield').style.display = 'flex'; }
        function resetAll() { location.reload(); }

        requestAnimationFrame(updateAnimation);
    </script>
</body>
</html>
