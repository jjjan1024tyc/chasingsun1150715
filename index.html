<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夸父追日 - 多人對戰版</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; text-align: center; background-color: #87CEEB; margin: 0; padding: 10px; display: flex; flex-direction: column; min-height: 98vh; overflow-x: hidden; user-select: none; }
        
        /* 標題區域設計 */
        .header-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 10px 0 20px 0; }
        h1 { color: #d84315; margin: 0; font-size: 60px; text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8); }

        /* 頂部控制區與人數選擇 */
        #topControls { background-color: rgba(255, 255, 255, 0.8); padding: 10px 20px; border-radius: 10px; margin-bottom: 15px; display: inline-flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .control-label { font-weight: bold; color: #d84315; font-size: 18px; }
        
        .mode-btn { background-color: #03A9F4; color: white; padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mode-btn:hover { background-color: #0288D1; transform: translateY(-2px); }
        .mode-btn.active { background-color: #FF9800; cursor: default; transform: translateY(2px); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        
        #restartBtn { background-color: #607d8b; color: white; padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 20px; }
        #restartBtn:hover { background-color: #455a64; }

        /* 對戰主要容器 */
        #battlefield { display: none; justify-content: center; gap: 15px; flex: 1; padding: 0 10px; flex-wrap: wrap; align-items: flex-start; }

        /* 針對不同人數的寬度分配 */
        .players-1 .player-zone { max-width: 800px; width: 100%; }
        .players-2 .player-zone { max-width: 48%; width: 100%; }
        .players-3 .player-zone { max-width: 32%; width: 100%; }
        .players-4 .player-zone { max-width: 24%; min-width: 240px; width: 100%; }

        /* 單一玩家的區域 */
        .player-zone { 
            flex: 1; 
            background: linear-gradient(to bottom, #E0F6FF 0%, #FFF3E0 100%);
            border: 4px solid #8B4513; 
            border-radius: 15px; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .player-title { font-size: 22px; font-weight: bold; color: #4e342e; margin-bottom: 5px; }
        
        /* 連線按鈕區域 */
        .connect-area { margin-bottom: 10px; }
        .btn-connect { background-color: #4CAF50; padding: 6px 12px; font-size: 15px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        .btn-connect:hover { background-color: #388E3C; }
        .btn-connect:disabled { background-color: #bdbdbd; cursor: not-allowed; }
        .status-text { display: block; font-size: 13px; margin-top: 4px; color: #d32f2f; font-weight: bold; }

        /* 遊戲舞台：點擊可跑步 */
        .stage { 
            width: 100%; 
            aspect-ratio: 1 / 0.65; 
            position: relative; 
            /* 天空 85%，地板 15% */
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 85%, #8B4513 85%, #A0522D 100%);
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden; 
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        /* 太陽 */
        .moving-sun {
            position: absolute;
            top: 5%;
            left: -25%; 
            width: 20%; 
            max-width: 150px; 
            height: auto;
            transition: left 0.2s ease-out, opacity 0.3s;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
        }

        /* 夸父容器 */
        .kuafu-wrap {
            position: absolute;
            /* 地板佔15%，一半為7.5%，讓夸父的腳踩在地板中間 */
            bottom: 7.5%; 
            left: 50%;
            transform: translateX(-50%);
            width: 35%; 
            pointer-events: none;
            z-index: 10;
        }

        /* Canvas 樣式，並加上陰影讓角色更立體 */
        .kf-canvas {
            width: 100%;
            display: block;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
        }

        .score-board { font-size: 18px; font-weight: bold; color: #5d4037; margin: 5px 0; }
        
        .trophy-case { 
            width: 100%; min-height: 60px; background-color: rgba(255,255,255,0.8); border: 2px dashed #FFB300; 
            border-radius: 10px; padding: 5px; display: flex; flex-wrap: wrap; gap: 3px; 
            justify-content: center; align-items: center; align-content: flex-start;
            box-sizing: border-box;
        }
        
        .mini-sun { height: 35px; object-fit: contain; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 動畫 */
        .win-spin {
            animation: spinWin 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards !important;
            z-index: 100 !important;
        }

        @keyframes popIn { 0% { transform: scale(0) rotate(-180deg); } 80% { transform: scale(1.2) rotate(10deg); } 100% { transform: scale(1) rotate(0deg); } }
        
        @keyframes spinWin { 
            0% { transform: translateX(-50%) scale(1) rotate(0deg); } 
            100% { transform: translateX(-50%) scale(1.5) rotate(360deg); filter: drop-shadow(0 0 15px #FF9800); } 
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="kf01.png" alt="夸父" style="height: 80px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));" onerror="this.style.display='none'">
        <h1>夸父追日</h1>
        <img src="kfsun.png" alt="太陽" style="height: 80px;" onerror="this.style.display='none'">
    </div>
    
    <div id="topControls">
        <span class="control-label">選擇遊戲人數：</span>
        <button class="mode-btn" id="mode-1" onclick="setPlayerCount(1)">1人</button>
        <button class="mode-btn" id="mode-2" onclick="setPlayerCount(2)">2人</button>
        <button class="mode-btn" id="mode-3" onclick="setPlayerCount(3)">3人</button>
        <button class="mode-btn" id="mode-4" onclick="setPlayerCount(4)">4人</button>
        <button id="restartBtn" onclick="resetAll()">🔄 重新開始</button>
    </div>

    <!-- 音效資源 -->
    <div style="display:none;">
        <audio id="snd-step" src="https://assets.mixkit.co/active_storage/sfx/2092/2092-preview.mp3" preload="auto"></audio>
        <audio id="snd-ding" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
        <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
    </div>

    <div id="battlefield">
        <!-- 玩家 1 -->
        <div class="player-zone" id="zone-1">
            <div class="player-title">🟢 玩家 1</div>
            <div class="connect-area">
                <button class="btn-connect" id="btn-conn-1" onclick="connectDevice(1)">連線 1 號感測器</button>
                <span class="status-text" id="status-1">未連線</span>
            </div>
            <div class="stage" id="stage-1" onclick="simulateStep(1)">
                <img id="sun-1" class="moving-sun" src="kfsun.png" alt="太陽">
                <div class="kuafu-wrap" id="kf-wrap-1">
                    <canvas id="kf-canvas-1" class="kf-canvas"></canvas>
                </div>
            </div>
            <div class="score-board">戰績：<span id="score-1">0</span> / 10</div>
            <div class="trophy-case" id="trophy-1"></div>
        </div>

        <!-- 玩家 2 -->
        <div class="player-zone" id="zone-2">
            <div class="player-title">🟡 玩家 2</div>
            <div class="connect-area">
                <button class="btn-connect" id="btn-conn-2" onclick="connectDevice(2)">連線 2 號感測器</button>
                <span class="status-text" id="status-2">未連線</span>
            </div>
            <div class="stage" id="stage-2" onclick="simulateStep(2)">
                <img id="sun-2" class="moving-sun" src="kfsun.png" alt="太陽">
                <div class="kuafu-wrap" id="kf-wrap-2">
                    <canvas id="kf-canvas-2" class="kf-canvas"></canvas>
                </div>
            </div>
            <div class="score-board">戰績：<span id="score-2">0</span> / 10</div>
            <div class="trophy-case" id="trophy-2"></div>
        </div>

        <!-- 玩家 3 -->
        <div class="player-zone" id="zone-3">
            <div class="player-title">🔴 玩家 3</div>
            <div class="connect-area">
                <button class="btn-connect" id="btn-conn-3" onclick="connectDevice(3)">連線 3 號感測器</button>
                <span class="status-text" id="status-3">未連線</span>
            </div>
            <div class="stage" id="stage-3" onclick="simulateStep(3)">
                <img id="sun-3" class="moving-sun" src="kfsun.png" alt="太陽">
                <div class="kuafu-wrap" id="kf-wrap-3">
                    <canvas id="kf-canvas-3" class="kf-canvas"></canvas>
                </div>
            </div>
            <div class="score-board">戰績：<span id="score-3">0</span> / 10</div>
            <div class="trophy-case" id="trophy-3"></div>
        </div>

        <!-- 玩家 4 -->
        <div class="player-zone" id="zone-4">
            <div class="player-title">🔵 玩家 4</div>
            <div class="connect-area">
                <button class="btn-connect" id="btn-conn-4" onclick="connectDevice(4)">連線 4 號感測器</button>
                <span class="status-text" id="status-4">未連線</span>
            </div>
            <div class="stage" id="stage-4" onclick="simulateStep(4)">
                <img id="sun-4" class="moving-sun" src="kfsun.png" alt="太陽">
                <div class="kuafu-wrap" id="kf-wrap-4">
                    <canvas id="kf-canvas-4" class="kf-canvas"></canvas>
                </div>
            </div>
            <div class="score-board">戰績：<span id="score-4">0</span> / 10</div>
            <div class="trophy-case" id="trophy-4"></div>
        </div>
    </div>

    <script>
        const UART_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

        const MAX_SCORE = 10;
        const STEPS_PER_SCORE = 5;
        
        let gameEnded = false;
        let audioUnlocked = false;
        let currentPlayers = 0; 

        // 預先儲存「已經去背好」的畫布
        const kfImages = new Array(30).fill(null);
        
        // 【升級】載入 30 張夸父圖片並利用「邊緣填充(Flood Fill)」演算法進行精準去背
        for (let i = 1; i <= 30; i++) {
            const img = new Image();
            const num = i.toString().padStart(2, '0');
            img.src = `kf${num}.png`;
            img.onload = () => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                const ctx = tempCanvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(img, 0, 0);

                try {
                    const imageData = ctx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                    const data = imageData.data;
                    const width = tempCanvas.width;
                    const height = tempCanvas.height;
                    
                    // 魔術棒演算法：從邊緣開始尋找白色並清除，保護封閉在黑色輪廓內的白色眼珠
                    const visited = new Uint8Array(width * height);
                    const stack = [];

                    function push(x, y) {
                        if (x >= 0 && x < width && y >= 0 && y < height) {
                            const idx = y * width + x;
                            if (!visited[idx]) {
                                stack.push(idx);
                                visited[idx] = 1;
                            }
                        }
                    }

                    // 從圖片最外圍的四個邊界開始
                    for (let x = 0; x < width; x++) { push(x, 0); push(x, height - 1); }
                    for (let y = 0; y < height; y++) { push(0, y); push(width - 1, y); }

                    while (stack.length > 0) {
                        const idx = stack.pop();
                        const p = idx * 4;
                        
                        // 判斷是否為白色背景 (考量 GitHub 或不同螢幕渲染的微小色差，放寬容差至 240)
                        if (data[p] > 240 && data[p+1] > 240 && data[p+2] > 240) {
                            data[p+3] = 0; // 變透明
                            
                            const x = idx % width;
                            const y = Math.floor(idx / width);
                            // 往相鄰的上下左右擴散
                            push(x - 1, y);
                            push(x + 1, y);
                            push(x, y - 1);
                            push(x, y + 1);
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                } catch(e) {
                    // 跨域或安全限制防呆
                }
                
                // 儲存去好背的成品
                kfImages[i - 1] = tempCanvas;
            };
        }

        // 管理每位玩家的狀態
        const players = {
            1: { score: 0, steps: 0, device: null, server: null, buffer: "", currentFrame: 0, targetFrame: 0, lastFrameTime: 0 },
            2: { score: 0, steps: 0, device: null, server: null, buffer: "", currentFrame: 0, targetFrame: 0, lastFrameTime: 0 },
            3: { score: 0, steps: 0, device: null, server: null, buffer: "", currentFrame: 0, targetFrame: 0, lastFrameTime: 0 },
            4: { score: 0, steps: 0, device: null, server: null, buffer: "", currentFrame: 0, targetFrame: 0, lastFrameTime: 0 }
        };

        // 監聽鍵盤事件
        document.addEventListener('keydown', function(event) {
            if (event.repeat) return;
            if (!audioUnlocked) unlockAudio();
            if (currentPlayers === 0) setPlayerCount(4);

            switch(event.code) {
                case 'KeyA': simulateStep(1); break;
                case 'KeyS': simulateStep(2); break;
                case 'KeyD': simulateStep(3); break;
                case 'KeyF': simulateStep(4); break;
            }
        });

        function setPlayerCount(num) {
            currentPlayers = num;
            unlockAudio();

            const battlefield = document.getElementById('battlefield');
            battlefield.style.display = 'flex';
            battlefield.className = `players-${num}`;

            for(let i=1; i<=4; i++) {
                const btn = document.getElementById(`mode-${i}`);
                btn.classList.toggle('active', i === num);
                
                const zone = document.getElementById(`zone-${i}`);
                zone.style.display = (i <= num) ? 'flex' : 'none';
            }
            resetAll(); 
        }

        function unlockAudio() {
            if(audioUnlocked) return;
            ['snd-step', 'snd-ding', 'snd-win'].forEach(id => {
                const snd = document.getElementById(id);
                snd.volume = 0;
                snd.play().then(() => { snd.pause(); snd.currentTime = 0; snd.volume = 1.0; }).catch(e => {});
            });
            audioUnlocked = true;
        }

        // --- 藍牙連線區塊 ---
        async function connectDevice(playerId) {
            const btn = document.getElementById(`btn-conn-${playerId}`);
            const status = document.getElementById(`status-${playerId}`);
            try {
                status.innerText = "搜尋裝置中..."; status.style.color = "#ff9800";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [UART_SERVICE_UUID]
                });
                players[playerId].device = device;
                device.addEventListener('gattserverdisconnected', () => handleDisconnect(playerId));

                status.innerText = "連線中...";
                const server = await device.gatt.connect();
                players[playerId].server = server;
                
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                const characteristic = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (e) => handleData(e, playerId));
                
                btn.innerText = "🟢 已連線";
                btn.disabled = true;
                status.innerText = "連線穩定";
                status.style.color = "green";
            } catch (error) {
                console.error(`玩家 ${playerId} 連線失敗`, error);
                status.innerText = "連線失敗";
                status.style.color = "red";
            }
        }

        function handleDisconnect(playerId) {
            const btn = document.getElementById(`btn-conn-${playerId}`);
            const status = document.getElementById(`status-${playerId}`);
            btn.innerText = `連線 ${playerId} 號感測器`;
            btn.disabled = false;
            status.innerText = "已斷線";
            status.style.color = "red";
            players[playerId].device = null;
            players[playerId].server = null;
        }

        function handleData(event, playerId) {
            if (gameEnded || playerId > currentPlayers) return;
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            players[playerId].buffer += decoder.decode(value);

            if (players[playerId].buffer.includes('\n')) {
                const lines = players[playerId].buffer.split('\n');
                const latestData = lines[lines.length - 2].trim();
                players[playerId].buffer = lines[lines.length - 1];

                if (latestData === "HIT") {
                    executeStep(playerId);
                }
            }
        }

        // --- 遊戲邏輯區塊 ---
        function simulateStep(playerId) {
            if(!gameEnded && playerId <= currentPlayers) executeStep(playerId);
        }

        function executeStep(playerId) {
            const p = players[playerId];
            if (gameEnded || p.score >= MAX_SCORE) return;
            if (!audioUnlocked) unlockAudio();

            // 1. 播放踏步音效
            const stepSnd = document.getElementById('snd-step').cloneNode();
            stepSnd.volume = 1.0;
            stepSnd.play().catch(e=>{});

            // 2. 處理圖片動畫播放 (每次前進 6 幀)
            p.steps++;
            p.targetFrame += 6;

            // 3. 處理太陽移動
            const sun = document.getElementById(`sun-${playerId}`);
            let currentCycleStep = p.steps % STEPS_PER_SCORE;
            if (currentCycleStep === 0) currentCycleStep = STEPS_PER_SCORE;

            const sunPositionX = (currentCycleStep / STEPS_PER_SCORE) * 100;
            sun.style.transition = 'left 0.2s ease-out, opacity 0.3s';
            sun.style.opacity = 1;
            sun.style.left = `calc(${sunPositionX}% - 20%)`;

            // 4. 判斷是否得分
            if (currentCycleStep === STEPS_PER_SCORE) {
                handleScore(playerId);
            }
        }

        function handleScore(playerId) {
            const p = players[playerId];
            p.score++;
            document.getElementById(`score-${playerId}`).innerText = p.score;

            const dingSnd = document.getElementById('snd-ding').cloneNode();
            dingSnd.volume = 1.0;
            dingSnd.play().catch(e=>{});

            const trophy = document.createElement('img');
            trophy.src = 'kfsun.png';
            trophy.className = 'mini-sun';
            trophy.onerror = function() { this.style.display='none'; };
            document.getElementById(`trophy-${playerId}`).appendChild(trophy);

            const sun = document.getElementById(`sun-${playerId}`);

            if (p.score >= MAX_SCORE) {
                declareWinner(playerId);
            } else {
                setTimeout(() => {
                    sun.style.transition = 'none';
                    sun.style.opacity = 0;
                    sun.style.left = '-25%';
                }, 300);
            }
        }

        function declareWinner(playerId) {
            gameEnded = true;
            
            const cheer = document.getElementById('snd-win');
            cheer.currentTime = 0;
            cheer.play().catch(e=>{});

            const kfWrap = document.getElementById(`kf-wrap-${playerId}`);
            kfWrap.classList.add('win-spin');

            var duration = 3000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function resetAll() {
            gameEnded = false;
            if (currentPlayers === 0) return;

            for(let i=1; i<=4; i++) {
                players[i].score = 0;
                players[i].steps = 0;
                players[i].currentFrame = 0;
                players[i].targetFrame = 0;
                players[i].lastFrameTime = 0;
                
                document.getElementById(`score-${i}`).innerText = '0';
                document.getElementById(`trophy-${i}`).innerHTML = '';
                
                const sun = document.getElementById(`sun-${i}`);
                if (sun) {
                    sun.style.transition = 'none';
                    sun.style.opacity = 0;
                    sun.style.left = '-25%';
                }
                
                drawAndChromaKey(i, 0);

                const kfWrap = document.getElementById(`kf-wrap-${i}`);
                if (kfWrap) kfWrap.classList.remove('win-spin');
            }
        }

        // --- 圖片繪製渲染引擎 ---
        function drawAndChromaKey(playerId, frameIndex) {
            const canvas = document.getElementById(`kf-canvas-${playerId}`);
            if (!canvas) return false;
            const ctx = canvas.getContext('2d');
            
            // 直接拿出預先去背好的畫布
            const sourceCanvas = kfImages[frameIndex % 30];

            if (!sourceCanvas) return false;
            
            if (canvas.width !== sourceCanvas.width) { 
                canvas.width = sourceCanvas.width; 
                canvas.height = sourceCanvas.height; 
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(sourceCanvas, 0, 0);
            return true;
        }

        function updateAnimation() {
            const now = performance.now();
            
            for (let i = 1; i <= 4; i++) {
                const p = players[i];
                
                if (p.currentFrame < p.targetFrame) {
                    if (now - p.lastFrameTime >= 30) {
                        if (drawAndChromaKey(i, p.currentFrame + 1)) {
                            p.currentFrame++;
                            p.lastFrameTime = now;
                        }
                    }
                } 
                else if (p.currentFrame === 0 && p.lastFrameTime === 0) {
                    if (drawAndChromaKey(i, 0)) {
                        p.lastFrameTime = now; 
                    }
                }
            }
            requestAnimationFrame(updateAnimation);
        }

        requestAnimationFrame(updateAnimation);
    </script>
